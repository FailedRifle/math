        }

            try {
                const commitRes = await fetch('https://api.github.com/repos/FailedRifle/math/commits/main');
                const commitData = await commitRes.json();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: 'numeric', minute: '2-digit', hour12: true,
                    timeZone: 'America/New_York', timeZoneName: 'short'
                });
                githubLastUpdate = formatter.format(new Date(commitData.commit.committer.date)).replace(',', '');
            } catch (err) { githubLastUpdate = "Unavailable"; }

            try {
                const response = await fetch('https://api.github.com/repos/FailedRifle/math/commits?sha=main&per_page=100');
                const commits = await response.json();
                githubCommitCount = Array.isArray(commits) ? commits.length : "Not found";

        const tapHTML = `<!DOCTYPE html><html><head><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}</style></head><body><script>const link='https://cdn.jsdelivr.net/gh/FailedRifle/html5@main/throw-a-potato.html';fetch(link).then(r=>r.text()).then(d=>{document.open();document.write(d);document.close();});<\/script></body></html>`;
        const rbHTML = `<!DOCTYPE html><html><head><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}</style></head><body><script>const link='https://cdn.jsdelivr.net/gh/FailedRifle/html5@main/retro-bowl.html';fetch(link).then(r=>r.text()).then(d=>{document.open();document.write(d);document.close();});<\/script></body></html>`;        
        const ssHTML = `<!DOCTYPE html><html><head><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}</style></head><body><script>const link='https://cdn.jsdelivr.net/gh/FailedRifle/html5@main/shell-shockers.html';fetch(link).then(r=>r.text()).then(d=>{document.open();document.write(d);document.close();});<\/script></body></html>`;
        const wbHTML = `<!DOCTYPE html><html><head><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}</style></head><body><script>const link='https://cdn.jsdelivr.net/gh/FailedRifle/html5@main/wrestle-bros.html';fetch(link).then(r=>r.text()).then(d=>{document.open();document.write(d);document.close();});<\/script></body></html>`;
        const brHTML = `<!DOCTYPE html><html><head><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}</style></head><body><script>const link='https://cdn.jsdelivr.net/gh/FailedRifle/html5@main/buckshot-roulette.html';fetch(link).then(r=>r.text()).then(d=>{document.open();document.write(d);document.close();});<\/script></body></html>`;
        const dhHTML = `<!DOCTYPE html><html><head><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}</style></head><body><script>const link='https://cdn.jsdelivr.net/gh/FailedRifle/html5@main/drift-hunters.html';fetch(link).then(r=>r.text()).then(d=>{document.open();document.write(d);document.close();});<\/script></body></html>`;
        
        const sites = {
            "fnae": { name: "Five Nights at Epstein's", enabled: true,  content: fnaeHTML},
            "geometrydash": { name: "Geometry Dash Lite", enabled: true,  content: gdHTML},
            "minecraft": { name: "Minecraft v1.12.2", enabled: true,  content: mcHTML},
            "zombies": { name: "CoD Zombies", enabled: true,  content: nzHTML},
            "sm64": { name: "Super Mario 64", enabled: true,  content: sm64HTML},
            "potato": { name: "Throw a Potato", enabled: true,  content: tapHTML },
            "snowrider": { name: "Snow Rider 3D", enabled: true,  content: sr3dHTML},
            "retrobowl": { name: "Retro Bowl", enabled: true,  content: rbHTML},
            "shellshockers": { name: "Shell Shockers", enabled: false,  content: ssHTML},
            "wrestlebros": { name: "Wrestle Bros", enabled: false,  content: wbHTML},
            "buckshot": { name: "Buckshot Roulette", enabled: true,  content: brHTML},
            "drifthunter": { name: "Drift Hunters", enabled: true,  content: dhHTML},
        };

        const commandDetails = {
            "changelog": "View recent system updates.",
            "clear":     "Clear the terminal screen.",
            "credits":   "View the authors and contributors.",
            "gamelist":  "List all available games.",
            "help":      "Display this help menu.",
            "info":      "View repository and build information."
        };

        const inputField  = document.getElementById("terminalInput");
        const ghostField  = document.getElementById("ghost-input");
        const historyArea = document.getElementById("history");
        const ui          = document.getElementById("gdocs-scroll");
        document.getElementById("page-title-display").innerText = "CheddarOS " + OS_VERSION;

        function smartScroll() {
            const threshold = 120;
            const nearBottom = ui.scrollHeight - ui.scrollTop - ui.clientHeight < threshold;
            if (nearBottom) ui.scrollTop = ui.scrollHeight;
        }
        const allSuggestions = [...Object.keys(commandDetails), ...Object.keys(sites)].sort();

        function changelog(...entries) {
            return entries.map(e => {
                const formatted = e.split('$').join('<br>');
                return `<div class="log-line">${formatted}</div><div class="log-line"> </div>`;
            }).join('');
        }

        function openInBlank(siteObj) {
            const newWin = window.open('about:blank', '_blank');
            if (!newWin || newWin.closed || typeof newWin.closed == 'undefined') return false;
            newWin.document.write(siteObj.content);
            newWin.document.close();
            return true;
        }

        async function fakeLoad(siteKey) {
            isLaunching = true;
            inputField.disabled = true;
            const siteData = sites[siteKey];

            const outputBlock = document.createElement("div");
            outputBlock.className = "cmd-output-block";
            historyArea.appendChild(outputBlock);

            if (!siteData.enabled) {
                outputBlock.innerHTML += '<div class="log-line" style="color:#FF5555;">Sorry! ' + siteData.name + ' is currently unavailable.</div>';
                outputBlock.innerHTML += '<div class="log-line" style="color:#FFAA00;">This game has been taken offline because of an error.</div>';
                outputBlock.innerHTML += '<div class="log-line" style="color:#FFAA00;">Please check back next update to see the status of the game.</div>';
                isLaunching = false;
                inputField.disabled = false;
                inputField.focus();
                smartScroll();
                return;
            }

            const totalAssets = Math.floor(siteData.content.length / 2);
            const duration = Math.min((totalAssets / 300) * 1500, 4000);

            outputBlock.innerHTML += '<div class="log-line">Searching for ' + siteData.name + '...</div>';

            const loadLine = document.createElement("div");
            loadLine.className = "log-line";
            outputBlock.appendChild(loadLine);

            const startTime = Date.now();
            while (true) {
                const elapsed  = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current  = Math.floor(progress * totalAssets);
                loadLine.innerText = 'LOADING ASSETS: [' + current + '/' + totalAssets + ']';
                smartScroll();
                if (progress >= 1) break;
                await new Promise(r => setTimeout(r, Math.random() > 0.9 ? 60 : 15));
            }

            const success = openInBlank(siteData);

            if (success) {
                outputBlock.innerHTML += '<div class="log-line" style="color:#00FF00;">' + siteData.name + ' launched successfully.</div>';
            } else {
                outputBlock.innerHTML += '<div class="log-line" style="color:#FF5555;">ERROR: Popup was blocked by browser.</div>';
                outputBlock.innerHTML += '<div class="log-line" style="color:#FF5555;">Please allow popups and type "' + siteKey + '" again.</div>';
            }

            isLaunching = false;
            inputField.disabled = false;
            inputField.focus();
        }

        inputField.addEventListener('input', function() {
            const val = inputField.value.toLowerCase();
            if (!val) { ghostField.innerText = ""; return; }
            const match = allSuggestions.find(s => s.startsWith(val));
            ghostField.innerText = match ? val + match.slice(val.length) : "";
        });

        inputField.addEventListener('keydown', function(e) {
            if (isLaunching) return;
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (cmdHistory.length > 0 && historyIdx < cmdHistory.length - 1) {
                    historyIdx++;
                    inputField.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIdx > 0) {
                    historyIdx--;
                    inputField.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
                } else {
                    historyIdx = -1;
                    inputField.value = "";
                }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                if (ghostField.innerText) { inputField.value = ghostField.innerText; ghostField.innerText = ""; }
            } else if (e.key === 'Enter') {
                ghostField.innerText = "";
                handleInput();
            }
        });

        function handleInput() {
            const rawInput = inputField.value.trim();
            if (rawInput === "") return;
            cmdHistory.push(rawInput);
            historyIdx = -1;
            const userInput   = rawInput.toLowerCase();

            historyArea.innerHTML += '<div class="log-line"><span style="color:#202124;">cheddar&gt;</span> ' + rawInput + '</div>';
            const outputBlock = document.createElement("div");
            outputBlock.className = "cmd-output-block";
            historyArea.appendChild(outputBlock);

            if (userInput === "help") {
                const keys = Object.keys(commandDetails).sort();
                let lastLetter = "";

                keys.forEach(cmd => {
                    const currentLetter = cmd[0].toLowerCase();
                    if (lastLetter !== "" && currentLetter !== lastLetter) {
                        outputBlock.innerHTML += '<div class="log-line" style="margin-bottom:0; line-height:1;">&nbsp;</div>';
                    }
                    lastLetter = currentLetter;

                    outputBlock.innerHTML += `
                        <div class="log-line" style="display:grid; grid-template-columns: 150px 1fr; margin-bottom:0; line-height:1.2;">
                            <span>${cmd}</span>
                            <span>${commandDetails[cmd]}</span>
                        </div>`;
                });
            }
            else if (userInput === "clear") {
                historyArea.innerHTML = "";
                outputBlock.remove();
            }
            else if (userInput === "info") {
                outputBlock.innerHTML += `
                    <div class="log-line" style="color: #ffc567; font-weight: bold; margin-bottom: 4px;">CheddarOS</div>
                    <div class="log-line" style="display:grid; grid-template-columns: 150px 1fr; line-height:1.2;">
                        <span>System-Version</span>
                        <span>${OS_VERSION}</span>
                    </div>
                    <div class="log-line" style="display:grid; grid-template-columns: 150px 1fr; line-height:1.2;">
                        <span>Version</span>
                        <span>${githubCommitCount}</span>
                    </div>
                    <div class="log-line" style="display:grid; grid-template-columns: 150px 1fr; line-height:1.2;">
                        <span>Last Updated</span>
                        <span>${githubLastUpdate}</span>
                    </div>
                    <div class="log-line" style="display:grid; grid-template-columns: 150px 1fr; line-height:1.2;">
                        <span>Blocked Counter</span>
                        <span>1</span>
                    </div>
                `;
            }
            else if (userInput === "credits") {
                outputBlock.innerHTML += changelog(
                    "--- CREDITS ---",
                    "CheddarOS " + OS_VERSION,
                    "Lead Programmer$- Cheddar Hobbs",
                );
            }
            else if (userInput === "changelog") {
                outputBlock.innerHTML += changelog(
                    "--- CHANGELOG ---",
                    "3/9/2026$vALPHA-2.1.0$- Completely changed how games load$- Games load faster than ever$- Reduced lag in every game and inside CheddarOS$- Fixed GoGuardian bypass for Buckshot Roulette",
                    "3/8/2026$vALPHA-2.0.3$- Added Drift Hunters",
                    "3/7/2026$vALPHA-2.0.2$- Added a info command to see more information about CheddarOS",
                    "3/7/2026$vALPHA-2.0.1$- Formatted the games and the help list to look more professional$- Added an announcement text that will appear when you first load. (if there is an announcement)$- Minor bug fixes related towards the offline games and GoGouardian bypasses.",
                    "3/4/2026$vALPHA-2.0.0$ - Completely revamped the UI$- Changed tab name and icon",
                    "2/27/2026$vALPHA-1.1.0$- Massive Code Cleanup",
                    "2/27/2026$vALPHA-1.0.10$- Added Buckshot Roulette$- Buckshot Roulette offline while working on GoGuardian bypass",
                    "2/27/2026$vALPHA-1.0.9$- Added Wrestle Bros$- Wrestle Bros offline while working on GoGuardian bypass",
                    "2/27/2026$vALPHA-1.0.8$- Formatted the credits screen",
                    "2/26/2026$vALPHA-1.0.7$- Added Shell Shockers$- Shell Shockers offline while working on GoGuardian bypass",
                    "2/26/2026$vALPHA-1.0.6$- Added Retro Bowl",
                    "2/26/2026$vALPHA-1.0.5b$- Minor bug fixes$- Cut the loading speed in half.",
                    "2/25/2026$vALPHA-1.0.5$- Throw a Potato fixed$- Removed ads$- FNaE revamp$- Fixed Snow Rider 3D black screen",
                    "2/25/2026$vALPHA-1.0.4$- FNaE back online",
                    "2/25/2026$vALPHA-1.0.3$- FNaE taken offline$- Throw a Potato offline (GoGuardian)",
                    "2/23/2026$vALPHA-1.0.2$- Minor fixes$- Throw a Potato playable$- Added Snow Rider 3D (WIP)",
                    "2/23/2026$vALPHA-1.0.1$- Throw a Potato maintenance",
                    "2/23/2026$vALPHA-1.0.0$- CheddarOS early private access release."
                );
            }
            else if (userInput === "gamelist") {
                const keys = Object.keys(sites).sort();
                
                const groups = {};
                keys.forEach(key => {
                    const firstChar = key[0].toLowerCase();
                    if (!groups[firstChar]) groups[firstChar] = [];
                    groups[firstChar].push(key);
                });

                const sortedLetters = Object.keys(groups).sort();
                
                sortedLetters.forEach((letter, index) => {
                    if (index > 0) {
                        outputBlock.innerHTML += '<div class="log-line" style="margin-bottom:0; line-height:1;">&nbsp;</div>';
                    }

                    const subgroup = groups[letter].sort((a, b) => {
                        if (sites[a].enabled === sites[b].enabled) return a.localeCompare(b);
                        return sites[a].enabled ? -1 : 1;
                    });

                    subgroup.forEach(key => {
                        const status = sites[key].enabled ? '' : ' [OFFLINE]';
                        const name = sites[key].name;
                        const color = sites[key].enabled ? '#202124' : '#FF5555';
                        
                        outputBlock.innerHTML += `
                            <div class="log-line" style="display:grid; grid-template-columns: 150px 1fr; color:${color}; margin-bottom:0; line-height:1.2;">
                                <span>${key}</span>
                                <span>(${name})${status}</span>
                            </div>`;
                    });
                });
            }
            else if (sites[userInput]) {
                outputBlock.remove();
                fakeLoad(userInput);
            }
            else {
                outputBlock.innerHTML += '<div class="log-line">"' + rawInput + '" is not recognized as a valid command.</div>';
            }

            inputField.value = "";
            smartScroll();
        }
    </script>
</body>
</html>
