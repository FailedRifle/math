<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheddarOS Shell</title>
<style>
/* --- CORE STYLES --- */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Tahoma, 'MS Sans Serif', Arial, sans-serif;
    font-size: 11px; overflow: hidden;
    height: 100vh; width: 100vw; user-select: none; cursor: default;
}

.desktop {
    width: 100%; height: 100%; position: relative;
    background-image: url('https://d7hftxdivxxvm.cloudfront.net/?height=675&quality=80&resize_to=fill&src=https%3A%2F%2Fartsy-media-uploads.s3.amazonaws.com%2F2P6t_Yt6dF0TNN76dlp-_Q%252F3417757448_4a6bdf36ce_o.jpg&width=1200');
    background-size: cover; background-position: center bottom; background-repeat: no-repeat;
}
.desktop.no-img {
    background-image: none;
    background: linear-gradient(180deg, #4a90d4 0%, #7abcee 30%, #a8d4f5 44%, #c0dff7 48%, #7cc040 50%, #4ca820 55%, #38960e 65%, #1e6b08 100%);
}

.icons-col { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 6px; }
.desk-icon {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; width: 68px; padding: 4px 4px 3px;
    cursor: pointer; border-radius: 2px; border: 1px solid transparent;
}
.desk-icon:hover { background: rgba(49,106,197,0.35); border-color: rgba(120,170,255,0.7); }
.desk-icon .ico { font-size: 28px; line-height: 1; }
.desk-icon .lbl {
    font-size: 11px; color: white; text-align: center; line-height: 1.25;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.95), 0 0 8px rgba(0,0,0,0.7);
    word-break: break-word;
}

/* --- TASKBAR --- */
.taskbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 30px;
    background: linear-gradient(180deg, #245edc 0%, #3a78e4 5%, #2868d8 40%, #1a50c8 50%, #1a50c8 92%, #1240b0 100%);
    display: flex; align-items: center; z-index: 9000;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 -1px 0 #0e38a0;
}
.start-btn {
    height: 100%; padding: 0 14px 0 10px;
    background: linear-gradient(180deg, #5cb81c 0%, #4aa010 4%, #5cb81c 8%, #3e9000 40%, #368000 50%, #3e9000 100%);
    border: none; color: white; font-family: Tahoma, sans-serif; font-size: 14px;
    font-weight: bold; font-style: italic; cursor: pointer; display: flex; align-items: center; gap: 5px;
    border-radius: 0 14px 14px 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 1px 0 4px rgba(0,0,0,0.3);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6); margin-right: 4px;
}
.taskbar-items { flex: 1; display: flex; align-items: center; padding: 0 3px; gap: 2px; }
.tb-item {
    height: 22px; padding: 0 8px; min-width: 110px; max-width: 160px;
    background: linear-gradient(180deg, #3a70c8 0%, #2860b8 40%, #2050a8 50%, #2860b8 100%);
    border: 1px solid rgba(0,0,0,0.4); color: white; font-size: 11px;
    cursor: pointer; display: flex; align-items: center; gap: 5px; border-radius: 3px;
}
.tb-item.active { background: linear-gradient(180deg, #1840a0 0%, #2058b8 50%); }

.tray {
    height: 100%; padding: 0 8px; display: flex; align-items: center; gap: 7px;
    background: linear-gradient(180deg, #1848b8 0%, #1040a8 50%, #0c38a0 100%);
}
.tray-clock { color: white; font-size: 11px; min-width: 52px; text-align: center; }

/* --- XP WINDOWS --- */
.xp-win {
    position: absolute; background: #ece9d8;
    border-radius: 8px 8px 4px 4px;
    box-shadow: 2px 2px 12px rgba(0,0,0,0.55);
    display: flex; flex-direction: column; overflow: hidden;
}
.title-bar {
    height: 26px; background: linear-gradient(180deg, #0c5ed4 0%, #1878f0 6%, #1464d8 50%, #0c54c4 51%, #0848b8 100%);
    padding: 0 4px 0 7px; display: flex; align-items: center; gap: 5px; cursor: move;
}
.tb-text { flex: 1; color: white; font-size: 12px; font-weight: bold; }
.tb-btns { display: flex; gap: 2px; }
.tb-btn { width: 21px; height: 19px; border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(0,0,0,0.3); }
.tb-btn-close { background: linear-gradient(180deg, #d84040 0%, #b01818 51%, #c02828 100%); }

.dlg-body { padding: 12px 14px 10px; background: #ece9d8; }
.dlg-status { font-size: 10px; margin-bottom: 8px; padding: 3px 6px; border-radius: 2px; display: none; }
.dlg-status.ok { color: #005500; background: #e8ffe8; border: 1px solid #88cc88; }
.dlg-status.warn { color: #885500; background: #fff8e0; border: 1px solid #ddc060; }
.dlg-status.err { color: #880000; background: #fff0f0; border: 1px solid #ffaaaa; }

.dlg-btn-row { display: flex; justify-content: flex-end; gap: 5px; border-top: 1px solid #b8b5aa; padding-top: 9px; }
.dlg-btn { height: 23px; padding: 0 14px; font-size: 11px; cursor: pointer; border-radius: 3px; border: 1px solid #707070; }
.dlg-btn.primary { font-weight: bold; background: #c8dcf8; }

#ie-win { width: 850px; height: 560px; top: 38px; left: 90px; display: none; }
.cmd-body { flex: 1; background: #000; }
.cmd-body iframe { width: 100%; height: 100%; border: none; }
.rsz { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; opacity: 0.45; }
</style>
</head>
<body>

<div class="desktop" id="desktop">
    <div class="icons-col">
        <div class="desk-icon" ondblclick="showUpdate()">
            <div class="ico">🔄</div>
            <div class="lbl">CheddarOS Update</div>
        </div>
    </div>

    <div class="xp-win" id="login-win">
        <div class="title-bar" id="login-tb">
            <span class="tb-icon">🧀</span>
            <span class="tb-text">CheddarOS.exe</span>
            <div class="tb-btns">
                <div class="tb-btn tb-btn-close" onclick="closeWin('login-win')">✕</div>
            </div>
        </div>
        <div class="dlg-body">
            <div id="dlg-status" class="dlg-status"></div>
            <div class="dlg-btn-row">
                <button class="dlg-btn" id="load-btn">📂 Load CheddarOS</button>
                <button class="dlg-btn" id="update-btn">🔄 Check for Updates</button>
            </div>
        </div>
    </div>

    <div class="xp-win" id="ie-win">
        <div class="title-bar" id="ie-tb">
            <span class="tb-icon">🖥️</span>
            <span class="tb-text">C:\CheddarOS</span>
            <div class="tb-btns">
                <div class="tb-btn tb-btn-close" onclick="closeWin('ie-win')">✕</div>
            </div>
        </div>
        <div class="cmd-body">
            <iframe id="ie-frame"></iframe>
        </div>
        <div class="rsz" id="ie-rsz"></div>
    </div>
</div>

<div class="taskbar">
    <button class="start-btn">&#8862; start</button>
    <div class="taskbar-items" id="tb-items"></div>
    <div class="tray">
        <div class="tray-clock" id="clock">12:00 PM</div>
    </div>
</div>

<script>
/* --- CONFIGURATION --- */
const CONSOLE_URL = 'https://raw.githubusercontent.com/FailedRifle/math/main/console.html';
const INDEX_URL   = 'https://raw.githubusercontent.com/FailedRifle/math/main/index.html';
const LOCAL_VERSION = "vBETA-1.0.0e";

let ztop = 100;
const ws = {};

/* --- CLOCK --- */
function tick() {
    const n = new Date(), h = n.getHours(), m = n.getMinutes();
    document.getElementById('clock').textContent = (h % 12 || 12) + ':' + String(m).padStart(2, '0') + ' ' + (h >= 12 ? 'PM' : 'AM');
}
tick(); setInterval(tick, 20000);

/* --- WINDOWS --- */
function front(id) { const w = document.getElementById(id); if (w) w.style.zIndex = ++ztop; }

function regWin(id, lbl, ico) {
    if (ws[id]) return;
    ws[id] = { min: false };
    const b = document.createElement('div');
    b.className = 'tb-item active'; b.id = 'tb-' + id;
    b.innerHTML = `<span>${ico}</span><span>${lbl}</span>`;
    b.onclick = () => front(id);
    document.getElementById('tb-items').appendChild(b);
}

function closeWin(id) {
    document.getElementById(id).style.display = 'none';
    const b = document.getElementById('tb-' + id);
    if (b) b.remove();
    delete ws[id];
}

function showUpdate() {
    document.getElementById('login-win').style.display = 'flex';
    regWin('login-win', 'Update', '🧀');
    front('login-win');
}

/* --- LOGIC: FETCH & VERSION DETECTION --- */
function showStatus(msg, type) {
    const el = document.getElementById('dlg-status');
    el.textContent = msg;
    el.className = 'dlg-status ' + type;
    el.style.display = 'block';
}

function extractVersion(text) {
    const match = text.match(/const OS_VERSION\s*=\s*["']([^"']+)["']/);
    return match ? match[1] : null;
}

async function doFullReset() {
    showStatus("CRITICAL: Version mismatch. Refreshing system...", "warn");
    try {
        const res = await fetch(INDEX_URL);
        const code = await res.text();
        document.open();
        document.write(code);
        document.close();
    } catch (e) {
        location.reload(); // Fallback to standard reload
    }
}

async function checkUpdates() {
    const btn = document.getElementById('update-btn');
    btn.disabled = true;
    showStatus("Checking repository for changes...", "warn");

    try {
        const res = await fetch(CONSOLE_URL);
        const code = await res.text();
        const remoteVersion = extractVersion(code);

        if (remoteVersion && remoteVersion !== LOCAL_VERSION) {
            showStatus(`New version detected (${remoteVersion}). Resetting...`, "warn");
            setTimeout(doFullReset, 1500);
        } else {
            showStatus(`System is up to date (${LOCAL_VERSION}).`, "ok");
            btn.textContent = "✅ Updated";
        }
    } catch (err) {
        showStatus("Update check failed.", "err");
    }
    btn.disabled = false;
}

async function loadPortal() {
    const btn = document.getElementById('load-btn');
    btn.disabled = true;
    showStatus("Fetching console from GitHub...", "warn");

    try {
        const res = await fetch(CONSOLE_URL);
        if (!res.ok) throw new Error();
        const code = await res.text();
        
        // Version Check on Load
        const remoteVersion = extractVersion(code);
        if (remoteVersion && remoteVersion !== LOCAL_VERSION) {
            doFullReset();
            return;
        }

        // Inject into internal window
        const win = document.getElementById('ie-win');
        win.style.display = 'flex';
        regWin('ie-win', 'C:\\CheddarOS', '🖥️');
        front('ie-win');

        const frameDoc = document.getElementById('ie-frame').contentWindow.document;
        frameDoc.open();
        frameDoc.write(code);
        frameDoc.close();

        showStatus("CheddarOS Online.", "ok");
    } catch (err) {
        showStatus("Failed to reach repository.", "err");
    }
    btn.disabled = false;
}

/* --- INTERFACE --- */
document.getElementById('update-btn').onclick = checkUpdates;
document.getElementById('load-btn').onclick = loadPortal;

function makeDraggable(tbId, winId) {
    const tb = document.getElementById(tbId), win = document.getElementById(winId);
    let ox, oy, sx, sy, on = false;
    tb.onmousedown = (e) => {
        if (e.target.classList.contains('tb-btn')) return;
        front(winId);
        const r = win.getBoundingClientRect();
        ox = r.left; oy = r.top; sx = e.clientX; sy = e.clientY; on = true;
    };
    document.onmousemove = (e) => { if (!on) return; win.style.left = (ox + e.clientX - sx) + 'px'; win.style.top = (oy + e.clientY - sy) + 'px'; };
    document.onmouseup = () => on = false;
}
makeDraggable('login-tb', 'login-win');
makeDraggable('ie-tb', 'ie-win');

window.addEventListener('message', (e) => {
    if (e.data?.type === 'cheddar-launch') {
        const game = window.open('about:blank', '_blank');
        game.document.write(e.data.content);
        game.document.close();
    }
});

showUpdate();
</script>
</body>
</html>
